<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Homeo Hive</title>
    <script>
      var path =mwindow.location.pathname,
      window.location.replace(
        window.location.origin + '/' + 
        path.split('/').slice(1,2).join('/') +
        '/?p=/' +
        path.split('/').slice(2).join('/').replace(/&/g, '~and~') +
        (window.location.search ? '&q=' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
        window.location.hash
      );
    </script>
  </head>
  <body></body>
</html>
